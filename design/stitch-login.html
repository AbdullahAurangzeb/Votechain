<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Background Decorative Element -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl h-full opacity-20">
<img class="w-full h-full object-contain" data-alt="A highly detailed, low-opacity isometric digital illustration of a glowing blue and emerald blockchain network. The scene features interconnected nodes, cryptographic blocks, and circuit-like data paths flowing through a dark, deep navy digital void. The style is premium, secure, and modern, echoing a high-end fintech or national security interface with subtle neon luminosity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuByK6JPHv2fmgKtu-vDwH5etDVc9oo2ZJJq6MLIp4P9fvugHTP0udDdA9EpfXYqNDIFaAIgnmu-flakRJETpLK5whykMCBJDvplibOeJtHIEIWoDnn0A1tzSi9fks8WATfA0S8jzRDum-B2O8GoBMXkOtGLTezy7bGi0_f1cAeUWk_Y_JuB-tm23LbXttsGFHAh3szGVoRInw-v_hlcS--cquNKDY1o4GSpLaCiMmHZx-KLM9sL8eqZV6ew3dGjJViMpRQuqtQ13vc">

<!-- Login Card Container -->
<div class="w-full max-w-[440px] flex flex-col items-center space-y-8">
<!-- Top Section -->
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-24 h-24 mb-2 animate-float">
<img alt="VoteChain Shield Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLvpNfCVw05AEEt1nBiHfdOA2jRGw4hS-r3unUfvCjpyl7brODWJnOcnFAxUU6G09RrK15kiSAzjCdw9RlWi5LYv5UJ_NHhkC91lEHp8EHjeoVrY2J07NBxPaT9KerktAlBNpvL5QTmao4iz2XD6ubSN3lqwL_rZmdgZ7pjZmyj6jdqloUFL8T_TXoAZiECRROXmqptjSDi7CryW46Ta0tqbquRb7Zw9sZZo2uUfUSWMRaJ5TAh9OY0uJqI">
</div>
<div class="space-y-1">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">
            Welcome Back
          </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">
            Login to continue your secure voting journey.
          </p>
</div>
</div>
<!-- Form Section -->
<form class="w-full space-y-6">
<div class="space-y-4">
<!-- Email / CNIC Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 ml-1" for="identifier">Email or CNIC</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-300 focus-within:border-primary glow-primary overflow-hidden">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">id_card</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-on-surface-variant/50 font-body-md" id="identifier" name="identifier" placeholder="Enter your credentials" type="text">
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 ml-1" for="password">Password</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl border border-outline-variant transition-all duration-300 focus-within:border-primary glow-primary overflow-hidden">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-on-surface-variant/50 font-body-md" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary focus:ring-offset-background transition-all" type="checkbox">
<span class="ml-3 font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface">Remember Me</span>
</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-xl flex items-center justify-center space-x-2 shadow-lg shadow-primary-container/20 hover:brightness-110 active:scale-[0.98] transition-all duration-150" type="submit">
<span>Login</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Secondary Section -->
<div class="pt-2 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
          Don't have an account? 
          <a class="text-primary font-semibold hover:underline" href="#">Register</a>
</p>
</div>

</main>
<!-- Footer Security Badge -->
<footer class="relative z-10 py-8 flex flex-col items-center">
<div class="flex items-center space-x-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<p class="font-label-md text-label-md tracking-wide">
        Your data is encrypted and secured using blockchain technology.
      </p>
</div>
</footer>
<script>
    // Lightweight atmospheric interaction
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      const glow = document.querySelector('.fixed.inset-0 img');
      if(glow) {
        glow.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
      }
    });

    // Form submission animation mock
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      const originalContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span><span>Securing Connection...</span>`;
      
      setTimeout(() => {
        btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span><span>Authenticated</span>`;
        btn.classList.replace('bg-primary-container', 'bg-secondary-container');
      }, 1500);
    });
  </script>
